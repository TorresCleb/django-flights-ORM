{% extends "flights/layout.html" %}

{% block body %}
    <h1>Voos</h1>
    <ul>
        {% for flight in flights %}
            <li>
                <a href="{% url 'flight' flight.id %}">
                 {{flight.id}} : {{flight.origin}} para {{flight.destination}}
            </li>
        {% endfor%}
    </ul>
{% endblock %}
